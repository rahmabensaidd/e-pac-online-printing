services:
  mysql:
    image: mysql:8.4
    container_name: eprinting-mysql
    restart: unless-stopped
    env_file:
      - ./eprinting/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./eprinting
      dockerfile: Dockerfile
    container_name: eprinting-backend
    restart: unless-stopped
    env_file:
      - ./eprinting/.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eprinting-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql-data:
