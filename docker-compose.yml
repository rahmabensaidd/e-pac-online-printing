version: '3.8'

services:
  mysql-app:
    image: mysql:8.0
    container_name: mysql-app
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: eprinting_db
      MYSQL_USER: eprinting_user
      MYSQL_PASSWORD: eprinting_pass123
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql-app-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - eprinting-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    container_name: keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8081
      KC_HTTP_ENABLED: true

    command:
      - start-dev
      - --import-realm   # ✅ TRÈS IMPORTANT

    ports:
      - "8081:8081"

    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak-config/import/eprinting-realm.json:/opt/keycloak/data/import/realm.json  # ✅ BON CHEMIN

    networks:
      - eprinting-network

  backend:
    build:
      context: ./eprinting
      dockerfile: Dockerfile
    container_name: eprinting-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-app:3306/eprinting_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: eprinting_user
      SPRING_DATASOURCE_PASSWORD: eprinting_pass123

      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8081
      KEYCLOAK_REALM: eprinting
      KEYCLOAK_RESOURCE: eprinting-backend
      KEYCLOAK_CREDENTIALS_SECRET: your-client-secret

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8081/realms/eprinting
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8081/realms/eprinting/protocol/openid-connect/certs

    ports:
      - "8080:8080"

    depends_on:
      - mysql-app
      - keycloak

    networks:
      - eprinting-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eprinting-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      API_URL: http://localhost:8080
      KEYCLOAK_URL: http://localhost:8081
      KEYCLOAK_REALM: eprinting
      KEYCLOAK_CLIENT_ID: eprinting-frontend
    depends_on:
      - backend
    networks:
      - eprinting-network

networks:
  eprinting-network:
    driver: bridge

volumes:
  mysql-app-data:
  keycloak-data: