spring.application.name=${SPRING_APPLICATION_NAME:eprinting}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eprinting_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.continue-on-error=${SPRING_SQL_INIT_CONTINUE_ON_ERROR:false}
spring.sql.init.data-locations=classpath:users_dump.sql,classpath:books_dump.sql

security.authentication.mode=${SECURITY_AUTHENTICATION_MODE:jwt}
security.jwt.secret=${JWT_SECRET:change-me-please-change-me-please-123456789}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.public-key=${STRIPE_PUBLIC_KEY:}

shippo.api.base-url=${SHIPPO_API_BASE_URL:https://api.goshippo.com}
shippo.api.token=${SHIPPO_API_TOKEN:}
shippo.webhook.secret=${SHIPPO_WEBHOOK_SECRET:}
shippo.test-mode=${SHIPPO_TEST_MODE:true}
shippo.real-carrier-configured=${SHIPPO_REAL_CARRIER_CONFIGURED:false}
shippo.default.service=${SHIPPO_DEFAULT_SERVICE:standard}

shippo.sender.full-name=${SHIPPO_SENDER_FULL_NAME:EPAC Logistics}
shippo.sender.company=${SHIPPO_SENDER_COMPANY:EPAC}
shippo.sender.country=${SHIPPO_SENDER_COUNTRY:US}
shippo.sender.zip=${SHIPPO_SENDER_ZIP:10118}
shippo.sender.city=${SHIPPO_SENDER_CITY:New York}
shippo.sender.state=${SHIPPO_SENDER_STATE:NY}
shippo.sender.address1=${SHIPPO_SENDER_ADDRESS1:350 5th Avenue}
shippo.sender.address2=${SHIPPO_SENDER_ADDRESS2:Floor 20}
shippo.sender.phone=${SHIPPO_SENDER_PHONE:+12125550100}
shippo.sender.email=${SHIPPO_SENDER_EMAIL:test@epac.local}

pricing.api.base-url=${PRICING_API_BASE_URL:http://localhost:8000}

pricing.copilot.base-url=${PRICING_COPILOT_BASE_URL:http://localhost:8001}
