spring.application.name=eprinting
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/eprinting_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=eprinting_user
spring.datasource.password=eprinting_pass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.continue-on-error=false
spring.sql.init.data-locations=classpath:users_dump.sql,classpath:books_dump.sql

security.authentication.mode=jwt
security.jwt.secret=change-me-please-change-me-please-123456789
security.jwt.expiration-seconds=86400
