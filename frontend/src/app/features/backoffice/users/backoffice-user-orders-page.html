<div class="space-y-6">
  <app-backoffice-section-header
    [breadcrumb]="['Backoffice', 'Users', 'Orders']"
    title="User orders"
    description="Profile summary and all orders for this user."
  >
    <button
      header-actions
      type="button"
      class="admin-focus-ring rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-brand-navy transition hover:border-slate-300 hover:bg-slate-50"
      (click)="goBack()"
    >
      Back to users
    </button>
  </app-backoffice-section-header>

  @if (errorMessage()) {
    <div class="rounded-2xl border border-brand-pink/20 bg-red-50 px-4 py-3 text-sm text-brand-pink">
      {{ errorMessage() }}
    </div>
  }

  @if (details(); as user) {
    <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
      <app-backoffice-stat-card
        label="Total orders"
        [value]="totalOrders().toString()"
        change="For this user"
        hint="history"
        icon="fa-receipt"
        tone="neutral"
      />
      <app-backoffice-stat-card
        label="Total amount"
        [value]="'$' + totalAmount().toLocaleString()"
        change="Lifetime"
        hint="orders value"
        icon="fa-sack-dollar"
        tone="positive"
      />
      <app-backoffice-stat-card
        label="Role"
        [value]="user.role"
        change="Access level"
        hint="current role"
        icon="fa-user-shield"
        tone="warning"
      />
      <app-backoffice-stat-card
        label="Username"
        [value]="user.username"
        change="Identity"
        hint="linked account"
        icon="fa-user"
        tone="neutral"
      />
    </div>

    <app-backoffice-card title="User profile">
      <div class="grid gap-4 sm:grid-cols-2">
        <div>
          <p class="admin-label">Name</p>
          <p class="text-sm font-semibold text-brand-navy">{{ user.firstName }} {{ user.lastName }}</p>
        </div>
        <div>
          <p class="admin-label">Email</p>
          <p class="text-sm font-semibold text-brand-navy">{{ user.email }}</p>
        </div>
        <div>
          <p class="admin-label">Username</p>
          <p class="text-sm font-semibold text-brand-navy">{{ user.username }}</p>
        </div>
        <div>
          <p class="admin-label">Role</p>
          <p class="text-sm font-semibold text-brand-navy">{{ user.role }}</p>
        </div>
      </div>
    </app-backoffice-card>
  }

  <app-backoffice-data-table
    title="Orders list"
    description="All orders linked to this user."
    [columns]="orderColumns"
    [rows]="orderRows()"
    [loading]="loading()"
    [searchKeys]="['reference', 'status', 'priority']"
    [emptyState]="{
      icon: 'fa-receipt',
      title: 'No orders',
      description: 'This user has no orders yet.',
      actionLabel: ''
    }"
  />
</div>
