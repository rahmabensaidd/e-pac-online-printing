<div class="admin-shell-bg min-h-screen text-brand-navy">
  <div class="relative min-h-screen">
    <app-backoffice-sidebar />

    <div
      class="flex min-h-screen min-w-0 flex-1 flex-col transition-[padding] duration-200 ease-out"
      [class]="shell.sidebarCollapsed() ? 'lg:pl-20' : 'lg:pl-[16.25rem]'"
    >
      <div
        class="fixed inset-x-0 top-0 z-40 transition-[padding] duration-200 ease-out"
        [class]="shell.sidebarCollapsed() ? 'lg:pl-20' : 'lg:pl-[16.25rem]'"
      >
        <app-backoffice-header />
      </div>

      <main class="flex-1 pb-6 pt-[4.25rem]">
        <div class="admin-shell-container">
          <div class="py-5 lg:py-6">
            <router-outlet />
          </div>
        </div>
      </main>
    </div>
  </div>
</div>
